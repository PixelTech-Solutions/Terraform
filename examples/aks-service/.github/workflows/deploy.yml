# =============================================================================
# Example: A team creating an AKS cluster
# =============================================================================
# This is ALL a team needs in their repo. Just import the template and set vars.
# The platform workflow handles init, plan, apply, destroy automatically.
# =============================================================================

name: "Deploy AKS Cluster"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:
    inputs:
      destroy:
        description: "Destroy infrastructure?"
        type: boolean
        default: false

jobs:
  dev:
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: dev
      backend_key: "aks-cluster/dev/terraform.tfstate"
      additional_args: "-var-file=environments/dev.tfvars"
      destroy: ${{ github.event.inputs.destroy == 'true' }}
    secrets: inherit

  qa:
    needs: [dev]
    if: github.ref == 'refs/heads/main'
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: qa
      backend_key: "aks-cluster/qa/terraform.tfstate"
      additional_args: "-var-file=environments/qa.tfvars"
      destroy: ${{ github.event.inputs.destroy == 'true' }}
    secrets: inherit

  uat:
    needs: [qa]
    if: github.ref == 'refs/heads/main'
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: uat
      backend_key: "aks-cluster/uat/terraform.tfstate"
      additional_args: "-var-file=environments/uat.tfvars"
      destroy: ${{ github.event.inputs.destroy == 'true' }}
    secrets: inherit

  prod:
    needs: [uat]
    if: github.ref == 'refs/heads/main'
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: prod
      backend_key: "aks-cluster/prod/terraform.tfstate"
      additional_args: "-var-file=environments/prod.tfvars"
      destroy: ${{ github.event.inputs.destroy == 'true' }}
    secrets: inherit

  demo:
    needs: [dev]
    if: github.ref == 'refs/heads/main'
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: demo
      backend_key: "aks-cluster/demo/terraform.tfstate"
      additional_args: "-var-file=environments/demo.tfvars"
      destroy: ${{ github.event.inputs.destroy == 'true' }}
    secrets: inherit
