# =============================================================================
# Example: A team creating an AKS cluster
# =============================================================================
# This is ALL a team needs in their repo. Just import the template and set vars.
# The platform workflow handles init, plan, apply, destroy automatically.
#
# State key auto-derived:  <project_name>/<service_name>/<environment>/terraform.tfstate
# Var file auto-derived:   environments/<environment>.tfvars
# =============================================================================

name: "Deploy AKS Cluster"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  dev:
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: dev
      project_name: platform
      service_name: aks-cluster
    secrets: inherit

  qa:
    needs: [dev]
    if: github.ref == 'refs/heads/main'
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: qa
      project_name: platform
      service_name: aks-cluster
    secrets: inherit

  uat:
    needs: [qa]
    if: github.ref == 'refs/heads/main'
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: uat
      project_name: platform
      service_name: aks-cluster
    secrets: inherit

  prod:
    needs: [uat]
    if: github.ref == 'refs/heads/main'
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: prod
      project_name: platform
      service_name: aks-cluster
    secrets: inherit

  demo:
    needs: [dev]
    if: github.ref == 'refs/heads/main'
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra
      environment: demo
      project_name: platform
      service_name: aks-cluster
    secrets: inherit
