# =============================================================================
# Reusable Terraform Workflow for Azure
# =============================================================================
# GitLab-style pipeline with manual approval gates:
#
#   Push/PR:
#     Format ✅ → Validate ✅ → Plan ✅ (stops here)
#
#   Push to main:
#     Format ✅ → Validate ✅ → Plan ✅ → Apply ⏸️ [Review deployments button]
#                                       → Destroy ⏸️ [Review deployments button]
#
# Apply and Destroy pause and wait for you to click "Review deployments".
# That's GitHub's version of GitLab's play button.
#
# ONE-TIME SETUP per service repo:
#   Environments are auto-created by the Plan job on first run.
#   Just go to Settings → Environments → "dev" / "dev-destroy" → add Required reviewers.
# =============================================================================

name: Terraform

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to Terraform root module"
        type: string
        default: "."
      environment:
        description: "Deployment environment (dev, staging, prod)"
        type: string
        required: true
      terraform_version:
        description: "Terraform version to use"
        type: string
        default: "1.9.0"
      backend_resource_group:
        description: "Azure Resource Group for state storage"
        type: string
        default: "rg-terraform-state"
      backend_storage_account:
        description: "Azure Storage Account for state"
        type: string
        default: "stpixeltechstate"
      backend_container:
        description: "Blob container name for state files"
        type: string
        default: "tfstate"
      service_name:
        description: "Service name — used for state key and tfvars path (defaults to repo name)"
        type: string
        default: ""
      additional_args:
        description: "Extra Terraform CLI arguments (appended after -var-file)"
        type: string
        default: ""
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_USE_OIDC: ${{ secrets.ARM_CLIENT_SECRET == '' && 'true' || 'false' }}
  SERVICE_NAME: ${{ inputs.service_name != '' && inputs.service_name || github.event.repository.name }}
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"

jobs:
  # ===========================================================================
  # Format Check (auto)
  # ===========================================================================
  format:
    name: "Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
      - name: Terraform Format Check
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive -diff

  # ===========================================================================
  # Validate (auto)
  # ===========================================================================
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
      - name: Terraform Init (validation only)
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -backend=false
      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

  # ===========================================================================
  # Plan (auto)
  # ===========================================================================
  plan:
    name: "Plan (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ env.SERVICE_NAME }}/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "Service: ${{ env.SERVICE_NAME }}"
          echo "State key: ${{ env.SERVICE_NAME }}/${{ inputs.environment }}/terraform.tfstate"
          echo "Var file: environments/${{ inputs.environment }}.tfvars"
          terraform plan \
            -out=tfplan \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            ${{ inputs.additional_args }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 5

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan - \`${{ inputs.environment }}\`
            Plan completed. Review the output above.
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Create environments for approval gates
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/github-script@v7
        with:
          script: |
            const envs = ['${{ inputs.environment }}', '${{ inputs.environment }}-destroy'];
            for (const env of envs) {
              try {
                await github.rest.repos.getEnvironment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  environment_name: env,
                });
                console.log(`Environment "${env}" already exists`);
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.repos.createOrUpdateEnvironment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    environment_name: env,
                    wait_timer: 0,
                    reviewers: [],
                  });
                  console.log(`Created environment "${env}" — go add reviewers in Settings → Environments`);
                }
              }
            }

      - name: Check if reviewers are configured
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: check-reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const envName = '${{ inputs.environment }}';
            const { data } = await github.rest.repos.getEnvironment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment_name: envName,
            });
            const hasReviewers = data.protection_rules.some(r => r.type === 'required_reviewers' && r.reviewers.length > 0);
            console.log(`Environment "${envName}" has reviewers: ${hasReviewers}`);
            core.setOutput('has_reviewers', hasReviewers.toString());

    outputs:
      has_reviewers: ${{ steps.check-reviewers.outputs.has_reviewers }}

  # ===========================================================================
  # Apply — PAUSES here with "Review deployments" button (like GitLab ▶)
  # Skips if no reviewers configured (safe by default)
  # ===========================================================================
  apply:
    name: "Apply (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [plan]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.plan.outputs.has_reviewers == 'true'
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ env.SERVICE_NAME }}/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Terraform Apply
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve tfplan

  # ===========================================================================
  # Destroy — PAUSES here with "Review deployments" button (like GitLab ▶)
  # Requires environment "dev-destroy" with required reviewers set
  # ===========================================================================
  destroy:
    name: "Destroy (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: "${{ inputs.environment }}-destroy"
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ env.SERVICE_NAME }}/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Terraform Plan Destroy
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "========================================="
          echo " Resources that WILL BE DESTROYED:"
          echo "========================================="
          terraform plan -destroy \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            ${{ inputs.additional_args }}

      - name: Terraform Destroy
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform destroy -auto-approve \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            ${{ inputs.additional_args }}
