# =============================================================================
# Reusable Terraform Workflow for Azure
# =============================================================================
# One pipeline, one dropdown to control everything:
#
#   plan          → Format → Validate → Plan (default, read-only)
#   apply         → Format → Validate → Plan → Apply
#   destroy-plan  → Format → Validate → Destroy Plan (see what will die)
#   destroy       → Format → Validate → Destroy Plan → Destroy
#
# Push/PR always runs "plan" mode only.
# Manual trigger gives you the dropdown to pick action.
# =============================================================================

name: Terraform

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to Terraform root module"
        type: string
        default: "."
      environment:
        description: "Deployment environment (dev, staging, prod)"
        type: string
        required: true
      terraform_version:
        description: "Terraform version to use"
        type: string
        default: "1.9.0"
      backend_resource_group:
        description: "Azure Resource Group for state storage"
        type: string
        default: "rg-terraform-state"
      backend_storage_account:
        description: "Azure Storage Account for state"
        type: string
        default: "stpixeltechstate"
      backend_container:
        description: "Blob container name for state files"
        type: string
        default: "tfstate"
      backend_key:
        description: "State file key (e.g. myservice/terraform.tfstate)"
        type: string
        required: true
      action:
        description: "Action: plan, apply, destroy-plan, destroy"
        type: string
        default: "plan"
      additional_args:
        description: "Additional Terraform arguments"
        type: string
        default: ""
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_USE_OIDC: ${{ secrets.ARM_CLIENT_SECRET == '' && 'true' || 'false' }}
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"

jobs:
  # ===========================================================================
  # STAGE 1: Format
  # ===========================================================================
  format:
    name: "Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
      - name: Terraform Format Check
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive -diff

  # ===========================================================================
  # STAGE 2: Validate
  # ===========================================================================
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
      - name: Terraform Init (validation only)
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -backend=false
      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

  # ===========================================================================
  # STAGE 3: Plan (action = plan or apply)
  # ===========================================================================
  plan:
    name: "Plan (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [validate]
    if: inputs.action == 'plan' || inputs.action == 'apply'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform plan \
            -out=tfplan \
            ${{ inputs.additional_args }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 5

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan - \`${{ inputs.environment }}\`
            Plan completed. Review the output above.
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ===========================================================================
  # STAGE 4: Apply (action = apply)
  # ===========================================================================
  apply:
    name: "Apply (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [plan]
    if: inputs.action == 'apply'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Terraform Apply
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve tfplan

  # ===========================================================================
  # STAGE 5: Destroy Plan (action = destroy-plan or destroy)
  # ===========================================================================
  destroy-plan:
    name: "Destroy Plan (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [validate]
    if: inputs.action == 'destroy-plan' || inputs.action == 'destroy'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Terraform Plan Destroy
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "========================================="
          echo " DESTROY PLAN - Resources to be deleted:"
          echo "========================================="
          terraform plan -destroy \
            ${{ inputs.additional_args }}

  # ===========================================================================
  # STAGE 6: Destroy (action = destroy)
  # ===========================================================================
  destroy:
    name: "Destroy (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [destroy-plan]
    if: inputs.action == 'destroy'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Terraform Destroy
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform destroy -auto-approve \
            ${{ inputs.additional_args }}
