# =============================================================================
# Reusable Terraform Workflow for Azure
# =============================================================================
# Teams import this workflow and only need to set variables.
#
# How it works:
#   - Push/PR:                    Format → Validate → Plan (read-only, safe)
#   - Manual + apply=true:        Format → Validate → Plan → Apply
#   - Manual + destroy=true:      Format → Validate → Destroy
#
# State stored in Azure Blob Storage with native blob lease locking.
# Auth via OIDC — no client secrets needed.
#
# Usage:
#   jobs:
#     terraform:
#       uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
#       with:
#         working_directory: ./infra
#         environment: dev
#         backend_key: "myservice/dev/terraform.tfstate"
#       secrets: inherit
# =============================================================================

name: Terraform

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to Terraform root module"
        type: string
        default: "."
      environment:
        description: "Deployment environment (dev, staging, prod)"
        type: string
        required: true
      terraform_version:
        description: "Terraform version to use"
        type: string
        default: "1.9.0"
      backend_resource_group:
        description: "Azure Resource Group for state storage"
        type: string
        default: "rg-terraform-state"
      backend_storage_account:
        description: "Azure Storage Account for state"
        type: string
        default: "stpixeltechstate"
      backend_container:
        description: "Blob container name for state files"
        type: string
        default: "tfstate"
      backend_key:
        description: "State file key (e.g. myservice/terraform.tfstate)"
        type: string
        required: true
      apply:
        description: "Set to true to run apply after plan"
        type: boolean
        default: false
      destroy:
        description: "Set to true to run destroy"
        type: boolean
        default: false
      additional_args:
        description: "Additional Terraform arguments"
        type: string
        default: ""
    secrets:
      ARM_CLIENT_ID:
        description: "Azure Service Principal Client ID (or OIDC app registration)"
        required: true
      ARM_TENANT_ID:
        description: "Azure AD Tenant ID"
        required: true
      ARM_SUBSCRIPTION_ID:
        description: "Azure Subscription ID"
        required: true
      ARM_CLIENT_SECRET:
        description: "Azure SP Client Secret (not needed if using OIDC)"
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_USE_OIDC: ${{ secrets.ARM_CLIENT_SECRET == '' && 'true' || 'false' }}
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"

jobs:
  # ===========================================================================
  # STAGE 1: Format Check
  # ===========================================================================
  format:
    name: "Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
      - name: Terraform Format Check
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive -diff

  # ===========================================================================
  # STAGE 2: Validate
  # ===========================================================================
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
      - name: Terraform Init (validation only)
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -backend=false
      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

  # ===========================================================================
  # STAGE 3: Plan (skipped if destroy=true)
  # ===========================================================================
  plan:
    name: "Plan (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [validate]
    if: inputs.destroy == false
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform plan \
            -out=tfplan \
            ${{ inputs.additional_args }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 5

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan - \`${{ inputs.environment }}\`
            Plan completed successfully. Review the plan output above.
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ===========================================================================
  # STAGE 4: Apply (only when apply=true)
  # ===========================================================================
  apply:
    name: "Apply (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [plan]
    if: inputs.apply == true && inputs.destroy == false
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Terraform Apply
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve tfplan

  # ===========================================================================
  # STAGE 5: Destroy (only when destroy=true)
  # ===========================================================================
  destroy:
    name: "Destroy (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [validate]
    if: inputs.destroy == true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login (OIDC)
        if: env.ARM_USE_OIDC == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
            -backend-config="container_name=${{ inputs.backend_container }}" \
            -backend-config="key=${{ inputs.backend_key }}" \
            -backend-config="use_oidc=${{ env.ARM_USE_OIDC }}"

      - name: Terraform Destroy
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform destroy -auto-approve \
            ${{ inputs.additional_args }}
