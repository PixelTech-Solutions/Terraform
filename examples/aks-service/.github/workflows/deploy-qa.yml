# =============================================================================
# Example: AKS cluster — QA environment
# =============================================================================

name: "Deploy AKS - QA"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  qa:
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra/aks-cluster
      environment: qa
      project_name: platform
      service_name: aks-cluster
    secrets: inherit
