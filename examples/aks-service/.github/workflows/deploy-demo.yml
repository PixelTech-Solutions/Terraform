# =============================================================================
# Example: AKS cluster — Demo environment
# =============================================================================

name: "Deploy AKS - Demo"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  demo:
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra/aks-cluster
      environment: demo
      project_name: platform
      service_name: aks-cluster
    secrets: inherit
