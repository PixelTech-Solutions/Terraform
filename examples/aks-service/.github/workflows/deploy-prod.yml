# =============================================================================
# Example: AKS cluster — Prod environment
# =============================================================================

name: "Deploy AKS - Prod"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  prod:
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra/aks-cluster
      environment: prod
      project_name: platform
      service_name: aks-cluster
    secrets: inherit
